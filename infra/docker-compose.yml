version: '3.9'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ohmo
      POSTGRES_PASSWORD: ohmo
      POSTGRES_DB: ohmo
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  mosquitto:
    image: eclipse-mosquitto:2
    ports: ["1883:1883", "9001:9001"]
    volumes: [./infra/mosquitto:/mosquitto/config]

volumes:
  pgdata:
